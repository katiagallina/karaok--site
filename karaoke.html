<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaokê</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <h1>🎤 KARAOKÊ</h1>
    <h2 id="nomeMusica"></h2>

    <p id="loadingMusica">🎵 Carregando música...</p>

    <!-- ✅ BOTÃO PLAY CORRIGIDO -->
    <button id="btnPlay" onclick="cantar()" class="btn" 
        style="background:#22c55e; margin-bottom:15px;">
        ▶ INICIAR MÚSICA
    </button>

    <!-- PLAYER YOUTUBE -->
    <div id="youtubeContainer" style="margin: 15px 0;">
        <div id="youtubePlayer"></div>
    </div>

    <p style="font-size: 0.8rem;">
        Clique no botão acima para começar
    </p>

    <!-- CONTROLES DE SINCRONIA -->
    <div id="controlesSincronia" style="display:none; margin:10px;">
        <button onclick="ajustarSincronia(-1)">-1s</button>
        <span id="displaySincronia">0.0s</span>
        <button onclick="ajustarSincronia(1)">+1s</button>
    </div>

    <p id="nomeUsuario"></p>

    <h2 id="pontuacao">⭐ 0</h2>

    <div class="letra"></div>

    <div class="controles">
        <button onclick="cantar()">🎤 Cantar</button>
        <button onclick="finalizar()">Finalizar</button>
    </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
