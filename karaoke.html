<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaokê</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Fonte Google -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <h1>🎤 KARAOKÊ</h1>
       <h2 id="nomeMusica"></h2>
        <p id="loadingMusica">🎵 Carregando letra...</p>

        <!-- PLAYER DO YOUTUBE -->
        <div id="youtubeContainer" style="margin: 15px 0; border-radius: 20px; overflow: hidden; box-shadow: 0 0 15px var(--neon-blue);">
            <div id="youtubePlayer"></div>
        </div>
        <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px;">Pressione play no vídeo para iniciar a música e a letra.</p>

        <!-- CONTROLES DE SINCRONIA MANUAL -->
        <div id="controlesSincronia" style="display: none; justify-content: center; gap: 10px; margin: 15px 0;">
            <button onclick="ajustarSincronia(-5)" class="btn" style="padding: 5px 15px; font-size: 0.8rem; background: var(--dark-bg-2);">-5s</button>
            <button onclick="ajustarSincronia(-1)" class="btn" style="padding: 5px 15px; font-size: 0.8rem; background: var(--dark-bg-2);">-1s</button>
            <span id="displaySincronia" style="font-size: 1rem; align-self: center; font-weight: bold; color: var(--neon-yellow); min-width: 50px;">0.0s</span>
            <button onclick="ajustarSincronia(1)" class="btn" style="padding: 5px 15px; font-size: 0.8rem; background: var(--dark-bg-2);">+1s</button>
            <button onclick="ajustarSincronia(5)" class="btn" style="padding: 5px 15px; font-size: 0.8rem; background: var(--dark-bg-2);">+5s</button>
        </div>

        <!-- NOME -->
        <p id="nomeUsuario"></p>
        <h2 id="quemCanta"></h2>

        <!-- PONTUAÇÃO -->
        <h2 id="pontuacao">⭐ 0</h2>

        <!-- LETRA -->
        <div class="letra"></div>

        <!-- BOTÕES -->
        <div class="controles">
            <button onclick="cantar()">🎤 Cantar</button>
            <button onclick="finalizar()">Finalizar</button>
        </div>

    </div>

    <!-- Seu JS -->
    <script src="js/script.js"></script>

</body>
</html>
