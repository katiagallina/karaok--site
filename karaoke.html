<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaokê</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Fonte Google -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <h1>🎤 KARAOKÊ</h1>
       <h2 id="nomeMusica"></h2>
        <p id="loadingMusica">🎵 Carregando letra...</p>

        <!-- PLAYER DE ÁUDIO -->
        <audio id="audioPlayer" controls style="margin: 15px 0; width: 100%; border-radius: 50px; outline: none;"></audio>
        <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: -15px;">Pressione play para ouvir a prévia e iniciar a letra.</p>

        <!-- NOME -->
        <p id="nomeUsuario"></p>
        <h2 id="quemCanta"></h2>

        <!-- PONTUAÇÃO -->
        <h2 id="pontuacao">⭐ 0</h2>

        <!-- LETRA -->
        <div class="letra"></div>

        <!-- BOTÕES -->
        <div class="controles">
            <button onclick="cantar()">🎤 Cantar</button>
            <button onclick="finalizar()">Finalizar</button>
        </div>

    </div>

    <!-- Seu JS -->
    <script src="js/script.js"></script>

</body>
</html>
