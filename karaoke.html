<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaokê</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">
    <h1>🎤 KARAOKÊ</h1>
    <h2 id="nomeMusica">Carregando...</h2>

    <p id="loadingMusica">🎵 Prepare a voz!</p>

    <div id="youtubeContainer" style="margin: 15px 0; background: #000; border-radius: 10px; overflow: hidden;">
        <div id="youtubePlayer"></div>
    </div>

    <div class="controles">
        <button id="btnPlay" onclick="cantar()" class="btn" style="background:#22c55e; padding: 15px 30px; font-size: 1.2rem;">
            ▶ COMEÇAR A CANTAR
        </button>
        
        <button onclick="finalizar()" class="btn" style="background:#ef4444;">Finalizar</button>
    </div>

    <p id="nomeUsuario"></p>
    <h2 id="pontuacao">⭐ 0</h2>

 
    <div class="letra"></div>

</div>

<script src="js/script.js"></script>

</body>
</html>
