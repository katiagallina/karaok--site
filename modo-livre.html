<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modo Livre</title>

    <!-- Fonte Google -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="container">
      <h1>🎤 MODO LIVRE</h1>
      <p>Escolha sua música e cante!</p>

      <!-- NOME -->
      <div class="campo">
        <label>Seu nome:</label>
        <input
          type="text"
          id="nome"
          placeholder="Digite seu nome de cantor(a)"
        />
      </div>

      <!-- BUSCA -->
      <div class="campo">
        <label>🔎 Buscar música:</label>
        <small
          style="color: var(--text-muted); margin-bottom: 10px; display: block"
        >
          Encontre a música e a letra automaticamente.
        </small>

        <input type="text" id="buscaMusica" placeholder="Digite a música" />

        <button onclick="buscarMusica()" class="btn">🔎 PESQUISAR</button>
      </div>

      <div id="resultadosBusca"></div>

      <!-- BOTÕES -->
      <div class="botoes">
        <button class="btn livre" onclick="iniciarModoLivre()">
          🎤 Começar a cantar
        </button>
        <a
        href="menu.html"
          class="btn"
          style="background: #64748b"
          >⬅ Voltar</a
        >
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
