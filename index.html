<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Karaokê</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- PARTÍCULAS -->
<div class="particles"></div>

<div class="container inicio">

    <!-- LOGO -->
    <h1 class="logo">🎤 KARAOKÊ</h1>

    <!-- FRASE -->
    <p class="frase">Solte a voz e brilhe no palco ✨</p>

    <!-- DESCRIÇÃO -->
    <p class="descricao">
        Cante suas músicas favoritas, desafie amigos e conquiste o topo do ranking!
    </p>

    <!-- BOTÃO -->
    <div class="botoes">
        <a href="menu.html" class="btn iniciar">
            🎤 CANTAR AGORA
        </a>
    </div>

</div>

<!-- ÁUDIO DE FUNDO -->
<audio id="bgMusic" loop>
    <source src="audios/bg.mp3" type="audio/mpeg">
</audio>

<script>
    // Tocar música ao clicar
    document.querySelector(".btn.iniciar").addEventListener("click", () => {
        let audio = document.getElementById("bgMusic");
        audio.play().catch(() => {});
    });
</script>

</body>
</html>
